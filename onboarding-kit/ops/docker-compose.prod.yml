# OnboardKit production stack (CLAUDE.md §14).
#   Deploy to /opt/onboardkit/ on the Hetzner box (alongside the other stacks).
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# TLS/routing is handled by the shared host-level Caddy that already fronts the
# other UrbanTrends stacks (sitechat, rentflow, urbantrends). This stack does NOT
# run its own Caddy — that would collide on :80/:443. Instead the api publishes
# on 127.0.0.1:8086 (loopback only, like every other app here) and the host
# Caddyfile reverse-proxies onboardkit.urbantrends.dev → 127.0.0.1:8086.
# See ops/Caddyfile for the vhost snippet to add.
#
# Differences from the dev stack (ops/docker-compose.yml):
#   - Pulls the prebuilt image from GHCR instead of building locally.
#   - Self-hosted MinIO (object storage) runs here too, published on loopback and
#     fronted by the host Caddy at https://${S3_PUBLIC_HOST} (see ops/Caddyfile).
#     S3_ENDPOINT must be that PUBLIC url — the api hands clients presigned URLs.
#   - No Caddy service; api/minio bound to loopback, fronted by the host Caddy.
#   - postgres stays on the internal compose network (no published port).
#   - Everything restarts unless-stopped.

name: onboardkit

x-backend-env: &backend-env
  APP_ENV: production
  RUST_LOG: ${RUST_LOG:-info,sqlx=warn,tower_http=info}
  DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
  JWT_SECRET: ${JWT_SECRET:?set a strong JWT_SECRET in .env}
  JWT_ACCESS_TTL_SECS: ${JWT_ACCESS_TTL_SECS:-900}
  JWT_REFRESH_TTL_SECS: ${JWT_REFRESH_TTL_SECS:-1209600}
  S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT to the public https url (https://${S3_PUBLIC_HOST})}
  S3_REGION: ${S3_REGION}
  S3_BUCKET: ${S3_BUCKET}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
  WORKER_POLL_INTERVAL_SECS: ${WORKER_POLL_INTERVAL_SECS:-5}
  # OTP codes must never be exposed in prod.
  DEV_EXPOSE_OTP: "false"
  CONSENT_TERMS_VERSION: ${CONSENT_TERMS_VERSION:-v1}
  # SMS: set false to actually deliver (AT primary, Infobip fallback).
  SMS_DRY_RUN: ${SMS_DRY_RUN:-false}
  AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME}
  AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY}
  AFRICASTALKING_SENDER_ID: ${AFRICASTALKING_SENDER_ID}
  INFOBIP_BASE_URL: ${INFOBIP_BASE_URL}
  INFOBIP_API_KEY: ${INFOBIP_API_KEY}
  INFOBIP_SENDER_ID: ${INFOBIP_SENDER_ID}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Self-hosted S3-compatible object storage (§11). Published on loopback only;
  # the host Caddy reverse-proxies https://${S3_PUBLIC_HOST} -> 127.0.0.1:9000
  # (path-style, so no wildcard cert). The bucket is private — only short-lived
  # presigned URLs are ever valid. Console is loopback-only (SSH tunnel).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY in .env}
      # Tells MinIO its public URL (TLS terminated by the host Caddy).
      MINIO_SERVER_URL: ${S3_ENDPOINT}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API — fronted by host Caddy
      - "127.0.0.1:9091:9001"   # console — SSH-tunnel only, never public
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/${GHCR_REPO:-urbantrends/onboardkit}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["api"]
    # Loopback-only, fronted by the shared host Caddy (see file header).
    ports:
      - "127.0.0.1:8086:8080"
    environment:
      <<: *backend-env
      API_HOST: 0.0.0.0
      API_PORT: 8080
    # Reach the public S3 host via the host Caddy (its TLS cert) instead of
    # hairpinning off the public IP, which Docker typically cannot do.
    extra_hosts:
      - "${S3_PUBLIC_HOST:?set S3_PUBLIC_HOST (bare hostname of S3_ENDPOINT)}:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  jobs:
    image: ghcr.io/${GHCR_REPO:-urbantrends/onboardkit}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["worker"]
    environment:
      <<: *backend-env
    extra_hosts:
      - "${S3_PUBLIC_HOST:?set S3_PUBLIC_HOST (bare hostname of S3_ENDPOINT)}:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
