name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Compile `query!` macros against the committed offline cache — no DB needed at
  # build time. Runtime integration tests (`#[sqlx::test]`) still use DATABASE_URL.
  SQLX_OFFLINE: "true"

jobs:
  backend:
    name: backend (fmt · clippy · test · sqlx offline)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: onboardkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/onboardkit
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version '^0.8' --no-default-features --features rustls,postgres --locked

      - name: Run migrations
        # Applies the schema so `sqlx prepare --check` can re-derive query metadata.
        # `#[sqlx::test]` creates its own isolated databases from this connection.
        run: cargo sqlx migrate run --source migrations

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (-D warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      - name: SQLx offline cache check
        # Verifies the committed `.sqlx/` cache is up-to-date with the queries.
        run: cargo sqlx prepare --workspace --check

  docker:
    name: docker image (cargo-chef cached build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (api + worker)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: onboardkit-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  office:
    name: office (Next.js typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/office
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/office/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
